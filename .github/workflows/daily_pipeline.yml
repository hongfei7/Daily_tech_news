name: Daily Tech Trend Pipeline

on:
  schedule:
    # 每天 UTC 时间凌晨 1 点运行 (北京时间早上 9 点)
    - cron: '0 1 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMAX_API_KEY: ${{ secrets.MiniMax_API_Key }}  # 从 GitHub Secrets 注入
        run: |
          # 确保 data 目录存在
          mkdir -p data/raw
          
          # 初始化数据库
          python scripts/init_db.py
          
          # 运行抓取与聚合
          python scripts/run_pipeline.py --days 1

      - name: Upload Database Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tech-trends-db
          path: data/tech_trends.db
          retention-days: 7

      - name: Finalize
        run: echo "Pipeline finished successfully. Database uploaded as artifact."
